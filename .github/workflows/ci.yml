name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  optimizer:
    name: Optimizer (Python + OR-Tools)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: optimizer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: optimizer/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest -q
