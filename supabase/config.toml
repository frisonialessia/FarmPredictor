# Supabase local dev config. Run the whole backend on your machine for FREE
# (needs Docker): `supabase start` → applies migrations/ and seed.sql, no cloud.
project_id = "farmpredictor"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600

# Both login methods we chose: magic link + email & password.
[auth.email]
enable_signup = true
enable_confirmations = false
secure_password_change = true

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]
